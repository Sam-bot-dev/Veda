<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Veda | Create Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script id="tailwind-config">
  tailwind.config = { darkMode:"class", theme:{ extend:{ colors:{
    "surface-container-low":"#161b2b","primary-fixed-dim":"#adc6ff","surface-bright":"#343949",
    "surface-variant":"#2f3445","on-primary":"#002e6a","secondary":"#4edea3","primary-fixed":"#d8e2ff",
    "on-surface":"#dee1f7","surface-dim":"#0e1322","on-background":"#dee1f7","outline":"#8c909f",
    "on-primary-fixed":"#001a42","on-primary-container":"#00285d","inverse-on-surface":"#2b3040",
    "background":"#0e1322","primary-container":"#4d8eff","on-secondary":"#003824",
    "surface-container-lowest":"#090e1c","secondary-fixed-dim":"#4edea3","secondary-fixed":"#6ffbbe",
    "tertiary-fixed":"#ffdad7","primary":"#adc6ff","on-secondary-fixed-variant":"#005236",
    "tertiary":"#ffb3ad","on-tertiary-container":"#5c0008","surface":"#0e1322",
    "inverse-primary":"#005ac2","tertiary-container":"#ff5451","on-surface-variant":"#c2c6d6",
    "on-error":"#690005","on-error-container":"#ffdad6","on-tertiary-fixed":"#410004",
    "on-tertiary-fixed-variant":"#930013","on-primary-fixed-variant":"#004395",
    "surface-container-highest":"#2f3445","error-container":"#93000a","surface-container-high":"#25293a",
    "surface-container":"#1a1f2f","error":"#ffb4ab","tertiary-fixed-dim":"#ffb3ad",
    "on-secondary-fixed":"#002113","surface-tint":"#adc6ff","outline-variant":"#424754",
    "on-tertiary":"#68000a","on-secondary-container":"#00311f","inverse-surface":"#dee1f7",
    "secondary-container":"#00a572"
  }, fontFamily:{"headline":["Inter"],"body":["Inter"],"label":["Inter"]},
  borderRadius:{"DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px"} } } }
</script>
<style>
  body { background-color:#0a0f1e; font-family:'Inter',sans-serif; }
  .glass-card { background:rgba(255,255,255,0.06); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.1); }
  .orb { position:absolute; border-radius:50%; filter:blur(80px); z-index:0; opacity:0.4; }
  .orb-1 { width:400px;height:400px;background:#1e3a8a;top:-100px;left:-100px; }
  .orb-2 { width:350px;height:350px;background:#312e81;bottom:-50px;right:-50px; }
  .orb-3 { width:300px;height:300px;background:#1e40af;top:40%;right:15%; }
  .spinner { width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block; }
  @keyframes spin { to{transform:rotate(360deg);} }
</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 antialiased relative overflow-auto">
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<main class="relative z-10 w-full max-w-[480px] py-8">
  <div class="glass-card rounded-xl p-8 md:p-12 shadow-[0_20px_40px_rgba(0,0,0,0.4)]">

    <div class="flex flex-col items-center text-center mb-8">
      <div class="w-16 h-16 bg-gradient-to-br from-primary to-primary-container rounded-xl flex items-center justify-center mb-5 shadow-lg">
        <span class="material-symbols-outlined text-white text-4xl" style="font-variation-settings:'FILL' 1">medical_services</span>
      </div>
      <h1 class="text-3xl font-extrabold tracking-tighter text-on-surface mb-2">Create Account</h1>
      <p class="text-on-surface-variant text-sm">Register your hospital staff access</p>
    </div>

    <div id="error-banner" class="hidden mb-5 px-4 py-3 rounded-lg bg-error-container/20 border border-error/30 text-error text-sm font-medium text-center"></div>
    <div id="success-banner" class="hidden mb-5 px-4 py-3 rounded-lg bg-secondary-container/20 border border-secondary/30 text-secondary text-sm font-medium text-center"></div>

    <form id="signup-form" class="space-y-5" onsubmit="return false">

      <!-- Role selector -->
      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-3 ml-1">Select Your Role</label>
        <div class="flex p-1 bg-white/5 border border-white/10 rounded-xl gap-1">
          <label class="flex-1">
            <input checked class="peer hidden" name="role" type="radio" value="pharmacist"/>
            <div class="cursor-pointer py-2 text-center text-[11px] font-bold uppercase tracking-tight text-on-surface-variant/60 rounded-lg transition-all peer-checked:bg-primary/20 peer-checked:text-primary peer-checked:shadow-sm hover:text-on-surface">Pharmacist</div>
          </label>
          <label class="flex-1">
            <input class="peer hidden" name="role" type="radio" value="manager"/>
            <div class="cursor-pointer py-2 text-center text-[11px] font-bold uppercase tracking-tight text-on-surface-variant/60 rounded-lg transition-all peer-checked:bg-primary/20 peer-checked:text-primary peer-checked:shadow-sm hover:text-on-surface">Manager</div>
          </label>
          <label class="flex-1">
            <input class="peer hidden" name="role" type="radio" value="admin"/>
            <div class="cursor-pointer py-2 text-center text-[11px] font-bold uppercase tracking-tight text-on-surface-variant/60 rounded-lg transition-all peer-checked:bg-primary/20 peer-checked:text-primary peer-checked:shadow-sm hover:text-on-surface">Admin</div>
          </label>
        </div>
        <p class="text-[10px] text-on-surface-variant/50 mt-2 ml-1">Role determines the email suffix required (@admin, @manager, or any)</p>
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1">Full Name</label>
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
            <span class="material-symbols-outlined text-[20px]">person</span>
          </div>
          <input id="name" type="text" placeholder="Dr. Riya Sharma" autocomplete="name" required
            class="w-full bg-white/5 border border-white/10 rounded-lg py-3.5 pl-11 pr-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/40 focus:border-primary/40 focus:outline-none transition-all"/>
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1">Work Email</label>
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
            <span class="material-symbols-outlined text-[20px]">alternate_email</span>
          </div>
          <input id="email" type="email" placeholder="riya@admin" autocomplete="email" required
            class="w-full bg-white/5 border border-white/10 rounded-lg py-3.5 pl-11 pr-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/40 focus:border-primary/40 focus:outline-none transition-all"/>
        </div>
        <p id="email-hint" class="text-[10px] text-on-surface-variant/50 mt-1.5 ml-1">Email must match selected role suffix</p>
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1">Password</label>
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
            <span class="material-symbols-outlined text-[20px]">lock</span>
          </div>
          <input id="password" type="password" placeholder="Min. 6 characters" autocomplete="new-password" required minlength="6"
            class="w-full bg-white/5 border border-white/10 rounded-lg py-3.5 pl-11 pr-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/40 focus:border-primary/40 focus:outline-none transition-all"/>
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1">Confirm Password</label>
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
            <span class="material-symbols-outlined text-[20px]">lock_reset</span>
          </div>
          <input id="confirm-pw" type="password" placeholder="Re-enter password" required
            class="w-full bg-white/5 border border-white/10 rounded-lg py-3.5 pl-11 pr-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/40 focus:border-primary/40 focus:outline-none transition-all"/>
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1">Hospital / Facility</label>
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
            <span class="material-symbols-outlined text-[20px]">local_hospital</span>
          </div>
          <input id="hospital" type="text" placeholder="Civil Hospital Ahmedabad"
            class="w-full bg-white/5 border border-white/10 rounded-lg py-3.5 pl-11 pr-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/40 focus:border-primary/40 focus:outline-none transition-all"/>
        </div>
      </div>

      <button id="signup-btn" type="submit"
        class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold py-4 rounded-lg shadow-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
        <span id="btn-text">Create Account</span>
        <span id="btn-spinner" class="spinner hidden"></span>
        <span id="btn-arrow" class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
      </button>
    </form>

    <div class="mt-6 text-center">
      <p class="text-sm text-on-surface-variant">Already have access? <a class="text-primary font-bold ml-1 hover:underline" href="signin.html">Sign In</a></p>
    </div>
  </div>
</main>

<script>
// Update email hint based on role selection
document.querySelectorAll('input[name="role"]').forEach(r => {
  r.addEventListener("change", () => {
    const hints = { pharmacist:"Any email format accepted", manager:"Email must end with @manager", admin:"Email must end with @admin" };
    document.getElementById("email-hint").textContent = hints[r.value] || "";
  });
});

document.getElementById("signup-form").addEventListener("submit", async () => {
  const name      = document.getElementById("name").value.trim();
  const email     = document.getElementById("email").value.trim();
  const pw        = document.getElementById("password").value;
  const confirmPw = document.getElementById("confirm-pw").value;
  const hospital  = document.getElementById("hospital").value.trim();
  const role      = document.querySelector('input[name="role"]:checked').value;
  const btn       = document.getElementById("signup-btn");

  if (!name || !email || !pw || !confirmPw) { showBanner("error","Please fill all required fields."); return; }
  if (pw !== confirmPw) { showBanner("error","Passwords do not match."); return; }
  if (pw.length < 6)    { showBanner("error","Password must be at least 6 characters."); return; }

  // Validate email suffix matches role
  const expectedSuffix = { admin:"@admin", manager:"@manager" };
  if (expectedSuffix[role] && !email.endsWith(expectedSuffix[role])) {
    showBanner("error", `${role.charAt(0).toUpperCase()+role.slice(1)} email must end with ${expectedSuffix[role]}`);
    return;
  }

  setLoading(true);

  if (FIREBASE_OK) {
    try {
      const cred = await _auth.createUserWithEmailAndPassword(email, pw);
      await cred.user.updateProfile({ displayName: name });
      // Store extra profile data in Firestore
      if (_db) {
        await _db.collection("users").doc(cred.user.uid).set({ name, email, role, hospital, createdAt: new Date().toISOString() });
      }
      showBanner("success", "Account created! Redirecting to dashboard…");
      setTimeout(() => window.location.href = ROLE_PAGES[role], 1500);
    } catch (err) {
      const msgs = {
        "auth/email-already-in-use":"This email is already registered.",
        "auth/invalid-email":"Invalid email format.",
        "auth/weak-password":"Password is too weak."
      };
      showBanner("error", msgs[err.code] || err.message);
      setLoading(false);
    }
  } else {
    // Demo mode
    setTimeout(() => {
      sessionStorage.setItem("veda_demo_user", JSON.stringify({ email, role, displayName: name }));
      showBanner("success","Account created (demo)! Redirecting…");
      setTimeout(() => window.location.href = ROLE_PAGES[role], 1200);
    }, 700);
  }
});

function showBanner(type, msg) {
  const errEl = document.getElementById("error-banner");
  const sucEl = document.getElementById("success-banner");
  errEl.classList.add("hidden"); sucEl.classList.add("hidden");
  if (type === "error")   { errEl.textContent = msg; errEl.classList.remove("hidden"); }
  if (type === "success") { sucEl.textContent = msg; sucEl.classList.remove("hidden"); }
}
function setLoading(on) {
  document.getElementById("signup-btn").disabled = on;
  document.getElementById("btn-text").textContent = on ? "Creating account…" : "Create Account";
  document.getElementById("btn-spinner").classList.toggle("hidden", !on);
  document.getElementById("btn-arrow").classList.toggle("hidden", on);
}
</script>
</body>
</html>
