<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Veda | Hospital Pharmacy Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-low": "#161b2b",
              "primary-fixed-dim": "#adc6ff",
              "surface-bright": "#343949",
              "surface-variant": "#2f3445",
              "on-primary": "#002e6a",
              "secondary": "#4edea3",
              "primary-fixed": "#d8e2ff",
              "on-surface": "#dee1f7",
              "surface-dim": "#0e1322",
              "on-background": "#dee1f7",
              "outline": "#8c909f",
              "on-primary-fixed": "#001a42",
              "on-primary-container": "#00285d",
              "inverse-on-surface": "#2b3040",
              "background": "#0e1322",
              "primary-container": "#4d8eff",
              "on-secondary": "#003824",
              "surface-container-lowest": "#090e1c",
              "secondary-fixed-dim": "#4edea3",
              "secondary-fixed": "#6ffbbe",
              "tertiary-fixed": "#ffdad7",
              "primary": "#adc6ff",
              "on-secondary-fixed-variant": "#005236",
              "tertiary": "#ffb3ad",
              "on-tertiary-container": "#5c0008",
              "surface": "#0e1322",
              "inverse-primary": "#005ac2",
              "tertiary-container": "#ff5451",
              "on-surface-variant": "#c2c6d6",
              "on-error": "#690005",
              "on-error-container": "#ffdad6",
              "on-tertiary-fixed": "#410004",
              "on-tertiary-fixed-variant": "#930013",
              "on-primary-fixed-variant": "#004395",
              "surface-container-highest": "#2f3445",
              "error-container": "#93000a",
              "surface-container-high": "#25293a",
              "surface-container": "#1a1f2f",
              "error": "#ffb4ab",
              "tertiary-fixed-dim": "#ffb3ad",

              "label": ["Inter"]

            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }

<style>
        body {
            background-color: #0a0f1e;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.4;
        }
        .orb-1 { width: 400px; height: 400px; background: #1e3a8a; top: -100px; left: -100px; }
        .orb-2 { width: 350px; height: 350px; background: #312e81; bottom: -50px; right: -50px; }
        .orb-3 { width: 300px; height: 300px; background: #1e40af; top: 40%; right: 15%; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 antialiased selection:bg-primary-container selection:text-white">
<!-- Ambient Orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<main class="relative z-10 w-full max-w-[480px]">
<!-- Login Card -->
<div class="glass-card rounded-xl p-8 md:p-12 shadow-[0_20px_40px_rgba(0,0,0,0.4)]">
<!-- Header Section -->
<div class="flex flex-col items-center text-center mb-10">
<div class="w-16 h-16 bg-gradient-to-br from-primary to-primary-container rounded-xl flex items-center justify-center mb-6 shadow-lg">
<span class="material-symbols-outlined text-white text-4xl" data-weight="fill">medical_services</span>
</div>
<h1 class="text-3xl font-extrabold tracking-tighter text-on-surface mb-2">Veda</h1>
<p class="text-on-surface-variant font-medium text-sm max-w-[280px]">Precision inventory for the medicines that matter.</p>
</div>
<!-- Form -->
<form action="#" class="space-y-6" onsubmit="return false">
<div class="mb-8">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-3 ml-1">Select Your Role</label>
<div class="flex p-1 bg-white/5 border border-white/10 rounded-xl gap-1">
<label class="flex-1">
<input checked="" class="peer hidden" name="role" type="radio" value="pharmacist"/>
<div class="cursor-pointer py-2 text-center text-[11px] font-bold uppercase tracking-tight text-on-surface-variant/60 rounded-lg transition-all peer-checked:bg-primary/20 peer-checked:text-primary peer-checked:shadow-sm hover:text-on-surface">
        Pharmacist
      </div>
</label>
<label class="flex-1">
<input class="peer hidden" name="role" type="radio" value="manager"/>
<div class="cursor-pointer py-2 text-center text-[11px] font-bold uppercase tracking-tight text-on-surface-variant/60 rounded-lg transition-all peer-checked:bg-primary/20 peer-checked:text-primary peer-checked:shadow-sm hover:text-on-surface">
        Manager
      </div>
</label>
<label class="flex-1">
<input class="peer hidden" name="role" type="radio" value="admin"/>
<div class="cursor-pointer py-2 text-center text-[11px] font-bold uppercase tracking-tight text-on-surface-variant/60 rounded-lg transition-all peer-checked:bg-primary/20 peer-checked:text-primary peer-checked:shadow-sm hover:text-on-surface">
        Admin
      </div>
</label>
</div>
</div><div>
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1" for="email">Work Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">alternate_email</span>
</div>
<input class="w-full bg-white/5 border border-white/10 rounded-lg py-3.5 pl-11 pr-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/40 focus:border-primary/40 focus:outline-none transition-all" id="email" placeholder="pharmacist@hospital.org" type="email"/>
</div>
</div>
<div>
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1" for="password">Secure Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full bg-white/5 border border-white/10 rounded-lg py-3.5 pl-11 pr-12 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/40 focus:border-primary/40 focus:outline-none transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between pt-2">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-white/10 bg-white/5 text-primary focus:ring-primary/40 transition-all" type="checkbox"/>
<span class="text-sm text-on-surface-variant group-hover:text-on-surface">Remember session</span>
</label>
<a class="text-sm font-semibold text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot Access?</a>
</div>
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold py-4 rounded-lg shadow-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Sign In to Secure Dashboard</span>
<span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-8 text-center">
<p class="text-sm text-on-surface-variant">
                    New to the medical staff? 
                    <a class="text-primary font-bold ml-1 hover:underline" href="#">Register Access</a>
</p>
</div>
<!-- Role Indicators (Instructional) -->
<div class="mt-8 pt-6 border-t border-white/5 flex flex-wrap justify-center gap-2 opacity-60">
<div class="px-3 py-1.5 rounded-full bg-white/5 border border-white/5 flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-primary-container"></span>
<span class="text-[11px] font-bold text-on-surface-variant tracking-tight uppercase">@manager <span class="font-normal normal-case opacity-60">for Managers</span></span>
</div>
<div class="px-3 py-1.5 rounded-full bg-white/5 border border-white/5 flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-secondary"></span>
<span class="text-[11px] font-bold text-on-surface-variant tracking-tight uppercase">@admin <span class="font-normal normal-case opacity-60">for Admins</span></span>
</div>
<div class="px-3 py-1.5 rounded-full bg-white/5 border border-white/5 flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-tertiary"></span>
<span class="text-[11px] font-bold text-on-surface-variant tracking-tight uppercase">Others <span class="font-normal normal-case opacity-60">for Pharmacists</span></span>
</div>
</div>
</div>
<!-- System Status Footer -->
<div class="mt-8 flex justify-center items-center gap-4 text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/40">
<div class="flex items-center gap-1.5">
<span class="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>
                SYSTEM SECURE
            </div>
<span class="opacity-30">|</span>
<div>V 4.8.2-HOSPITAL</div>
<span class="opacity-30">|</span>
<div>256-BIT ENCRYPTION</div>
</div>
</main>
<!-- Contextual Map / Background Imagery (Abstract Medical Visualization) -->
<div class="fixed inset-0 pointer-events-none opacity-10">
<img class="w-full h-full object-cover mix-blend-screen grayscale" data-alt="Abstract clinical blue glowing medical science pattern" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA44Hm0R_zL1PISmM3tiV67eZAyo3gfqLtYUYnQ5XMKwTQM2RqMefB5gZOYlyUFubAM6dVY10JtrhxFrdizfV-Dv9DHnj3HkY5zc7oqrQ1BvMxCgQx2vuk_rOn0vccQtFWfgt6_GxW4l53aASJgtMArS1m7UQA0nRdll1rqu7b_MWhJ9wM8KpCR3xLk8yF-rB7ffYvUWZvsJbqtLgWb6KBMv5nXIqpOTLw5dorGK9qMLk0Ojs8SpzfJkbzXyRuPHkA_9t2qrnSwWUd0"/>
</div>
</body></html>
