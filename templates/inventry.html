<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Veda | Inventory Management</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script id="tailwind-config">
  tailwind.config={darkMode:"class",theme:{extend:{colors:{
    "surface-container-high":"#25293a","error":"#ffb4ab","surface":"#0e1322",
    "secondary-fixed-dim":"#4edea3","on-secondary-container":"#00311f","secondary":"#4edea3",
    "primary-container":"#4d8eff","background":"#0e1322","on-tertiary":"#68000a",
    "surface-container-highest":"#2f3445","outline":"#8c909f","error-container":"#93000a",
    "on-secondary-fixed":"#002113","secondary-container":"#00a572","on-error-container":"#ffdad6",
    "tertiary":"#ffb3ad","tertiary-fixed-dim":"#ffb3ad","on-background":"#dee1f7",
    "secondary-fixed":"#6ffbbe","on-background":"#dee1f7","on-tertiary-fixed-variant":"#930013",
    "outline-variant":"#424754","tertiary-container":"#ff5451","on-primary-fixed-variant":"#004395",
    "surface-container-low":"#161b2b","surface-container":"#1a1f2f","surface-dim":"#0e1322",
    "on-primary":"#002e6a","primary":"#adc6ff","on-surface-variant":"#c2c6d6",
    "surface-variant":"#2f3445","on-surface":"#dee1f7","primary-fixed":"#d8e2ff",
    "primary-fixed-dim":"#adc6ff","on-primary-fixed":"#001a42","on-secondary":"#003824",
    "surface-container-lowest":"#090e1c","surface-bright":"#343949","tertiary-fixed":"#ffdad7",
    "on-primary-container":"#00285d","inverse-on-surface":"#2b3040","on-error":"#690005",
    "on-tertiary-fixed":"#410004","inverse-surface":"#dee1f7","surface-tint":"#adc6ff",
    "on-secondary-fixed-variant":"#005236","inverse-primary":"#005ac2","on-tertiary-container":"#5c0008"
  },fontFamily:{"headline":["Inter"],"body":["Inter"],"label":["Inter"]},
  borderRadius:{"DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px"}}}}
</script>
<style>
  body{font-family:'Inter',sans-serif;background-color:#0a0f1e;}
  .glass-panel{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
  .no-scrollbar::-webkit-scrollbar{display:none;}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none;}
  .liquid-gradient{background:linear-gradient(135deg,#adc6ff 0%,#4d8eff 100%);}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
  .modal-backdrop{background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);}
  .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body class="text-on-surface antialiased overflow-hidden">

<!-- TOPBAR -->
<header class="fixed top-0 w-full z-50 bg-[#0a0f1e]/80 backdrop-blur-xl border-b border-white/10 shadow-[0_20px_40px_rgba(0,0,0,0.4)] flex justify-between items-center h-16 px-6">
  <div class="flex items-center gap-4">
    <span class="text-xl font-bold tracking-tighter text-blue-100">Veda</span>
    <div class="h-4 w-px bg-white/10 mx-2"></div>
    <h1 class="text-sm font-medium text-on-surface-variant">Inventory Management</h1>
  </div>
  <div class="flex items-center gap-3">
    <button onclick="refreshData()" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/5 border border-white/5 hover:bg-white/10 transition-all" title="Refresh">
      <span class="material-symbols-outlined text-[18px] text-blue-400">refresh</span>
    </button>
    <button onclick="toggleAlerts()" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/5 border border-white/5 relative">
      <span class="material-symbols-outlined text-[18px] text-blue-400">notifications</span>
      <span id="alert-badge" class="absolute -top-1 -right-1 w-4 h-4 bg-error text-[9px] text-white flex items-center justify-center rounded-full font-bold hidden">0</span>
    </button>
    <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/5 border border-white/5">
      <span class="material-symbols-outlined text-[18px] text-blue-400">account_circle</span>
      <span class="text-sm text-on-surface-variant font-medium" id="top-name">—</span>
    </div>
  </div>
</header>

<!-- SIDEBAR -->
<aside class="fixed left-0 top-0 h-full w-64 z-40 bg-[#0a0f1e]/60 backdrop-blur-2xl border-r border-white/5 shadow-2xl flex flex-col pt-20 pb-6 font-['Inter'] text-sm font-medium">
  <div class="px-6 mb-8">
    <div class="text-lg font-black bg-gradient-to-br from-blue-200 to-blue-500 bg-clip-text text-transparent">Veda OS</div>
    <div class="text-[10px] text-slate-400 uppercase tracking-widest mt-1">Inventory Module</div>
  </div>
  <nav class="flex-1 space-y-1 px-3">
    <a href="#" onclick="goDashboard()" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-white/5 transition-all duration-200">
      <span class="material-symbols-outlined">dashboard</span><span>Dashboard</span>
    </a>
    <a href="inventry.html" class="flex items-center gap-3 px-4 py-3 rounded-lg bg-blue-500/10 text-blue-300 border-r-2 border-blue-500/50 transition-all duration-200">
      <span class="material-symbols-outlined">inventory_2</span><span>Inventory</span>
    </a>
    <a href="#" onclick="showToast('Orders coming soon','info')" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-white/5 transition-all duration-200">
      <span class="material-symbols-outlined">shopping_cart</span><span>Orders</span>
    </a>
    <a href="setting.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-white/5 transition-all duration-200">
      <span class="material-symbols-outlined">settings</span><span>Settings</span>
    </a>
  </nav>
  <div class="px-3 mt-auto space-y-1">
    <button id="add-stock-btn" class="w-full mb-4 liquid-gradient text-on-primary-container py-2.5 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-transform" onclick="openAddModal()">
      <span class="material-symbols-outlined text-[20px]">add</span> New Batch
    </button>
    <button onclick="signOut()" class="flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:text-red-400 hover:bg-red-500/10 transition-all duration-200 w-full">
      <span class="material-symbols-outlined">logout</span><span>Sign Out</span>
    </button>
  </div>
</aside>

<!-- MAIN -->
<main class="ml-64 pt-20 h-screen overflow-y-auto no-scrollbar flex bg-[#0a0f1e]">
  <div class="flex-1 p-8 space-y-8 max-w-[1400px]">

    <!-- STATS -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="surface-container-low glass-panel rounded-xl p-6 border border-white/5 flex flex-col justify-between">
        <span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-[0.2em]">Total Items</span>
        <div class="mt-4 flex items-baseline gap-2">
          <span class="text-4xl font-black text-primary" id="stat-total">—</span>
          <span class="text-xs font-bold text-secondary">SKUs</span>
        </div>
      </div>
      <div class="surface-container-low glass-panel rounded-xl p-6 border border-white/5 flex flex-col justify-between">
        <span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-[0.2em]">Stock Value</span>
        <div class="mt-4 flex items-baseline gap-2">
          <span class="text-4xl font-black text-on-surface" id="stat-value">₹—</span>
        </div>
      </div>
      <div class="surface-container-low glass-panel rounded-xl p-6 border border-white/10 ring-1 ring-error/20 flex flex-col justify-between bg-error/5">
        <span class="text-[10px] font-bold text-error uppercase tracking-[0.2em]">Critical Expiry Count</span>
        <div class="mt-4 flex items-baseline gap-2">
          <span class="text-4xl font-black text-error" id="stat-critical">—</span>
          <span class="text-xs font-medium text-error-container bg-error px-2 py-0.5 rounded-full" id="stat-action-badge">ACTION REQ</span>
        </div>
      </div>
    </div>

    <!-- TOOLBAR -->
    <div class="flex flex-wrap items-center justify-between gap-4 sticky top-0 z-30 py-2 bg-[#0a0f1e]/80 backdrop-blur-md">
      <div class="flex-1 flex items-center gap-4 min-w-[300px]">
        <div class="relative flex-1">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
          <input id="search-input" class="w-full bg-surface-container-highest border-none rounded-xl pl-12 pr-4 py-3 text-sm focus:ring-2 focus:ring-primary/40 placeholder:text-outline/60" placeholder="Search medicines, batches…" type="text" oninput="filterInventory()"/>
        </div>
        <div class="flex items-center gap-2">
          <select id="cat-filter" onchange="filterInventory()" class="bg-surface-container-low border-none rounded-xl py-3 px-4 text-sm text-on-surface-variant focus:ring-1 focus:ring-primary/40 appearance-none min-w-[140px]">
            <option value="">Category: All</option>
          </select>
          <select id="status-filter" onchange="filterInventory()" class="bg-surface-container-low border-none rounded-xl py-3 px-4 text-sm text-on-surface-variant focus:ring-1 focus:ring-primary/40 appearance-none min-w-[140px]">
            <option value="">Status: All</option>
            <option value="critical">Critical</option>
            <option value="warning">Warning</option>
            <option value="safe">Safe</option>
          </select>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="exportCSV()" class="bg-surface-container-highest hover:bg-surface-bright text-on-surface px-4 py-3 rounded-xl text-sm font-semibold flex items-center gap-2 transition-all">
          <span class="material-symbols-outlined text-[20px]">download</span>Export CSV
        </button>
        <button id="add-stock-btn2" onclick="openAddModal()" class="liquid-gradient text-on-primary-container px-6 py-3 rounded-xl text-sm font-bold flex items-center gap-2 shadow-lg active:scale-95 transition-transform">
          <span class="material-symbols-outlined text-[20px]">add_box</span>Receive Stock
        </button>
      </div>
    </div>

    <!-- INVENTORY CARDS -->
    <div class="grid grid-cols-1 gap-6 pb-12" id="inventory-cards">
      <div class="surface-container-low glass-panel rounded-xl border border-white/5 p-8 text-center text-on-surface-variant">
        Loading inventory…
      </div>
    </div>

  </div>
</main>

<!-- ALERTS DRAWER -->
<div id="alerts-drawer" class="fixed top-0 right-0 h-full w-80 bg-surface-container border-l border-white/10 z-50 transform translate-x-full transition-transform shadow-2xl flex flex-col">
  <div class="p-5 border-b border-white/5 flex items-center justify-between">
    <h3 class="font-bold text-on-surface">Active Alerts</h3>
    <button onclick="toggleAlerts()"><span class="material-symbols-outlined text-on-surface-variant">close</span></button>
  </div>
  <div id="alerts-list" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
</div>

<!-- ADD/RECEIVE STOCK MODAL -->
<div id="add-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
  <div class="absolute inset-0 modal-backdrop" onclick="closeAddModal()"></div>
  <div class="relative z-10 w-full max-w-2xl bg-surface-container rounded-2xl border border-white/10 shadow-2xl overflow-hidden">
    <div class="p-6 border-b border-white/5 flex items-center justify-between">
      <h3 class="text-lg font-bold text-on-surface">Receive New Stock Batch</h3>
      <button onclick="closeAddModal()"><span class="material-symbols-outlined text-on-surface-variant">close</span></button>
    </div>
    <div class="p-6 grid grid-cols-2 gap-4 overflow-y-auto max-h-[65vh]">
      <div class="col-span-2"><label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">Medicine Name *</label>
        <input id="a-name" class="w-full bg-white/5 border border-white/10 rounded-lg py-3 px-4 text-on-surface focus:ring-2 focus:ring-primary/40 focus:outline-none" placeholder="Paracetamol 500mg"/></div>
      <div><label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">Category</label>
        <select id="a-cat" class="w-full bg-white/5 border border-white/10 rounded-lg py-3 px-4 text-on-surface focus:outline-none">
          <option>Analgesic</option><option>Antibiotic</option><option>Antiviral</option><option>Cardiovascular</option><option>Diabetic</option><option>Respiratory</option><option>Gastrointestinal</option><option>Neurological</option><option>Other</option>
        </select></div>
      <div><label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">Batch No. *</label>
        <input id="a-batch" class="w-full bg-white/5 border border-white/10 rounded-lg py-3 px-4 text-on-surface focus:ring-2 focus:ring-primary/40 focus:outline-none" placeholder="BT-2024-XXX"/></div>
      <div><label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">Quantity *</label>
        <input id="a-qty" type="number" class="w-full bg-white/5 border border-white/10 rounded-lg py-3 px-4 text-on-surface focus:ring-2 focus:ring-primary/40 focus:outline-none" placeholder="500"/></div>
      <div><label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">Unit Cost (₹)</label>
        <input id="a-cost" type="number" step="0.01" class="w-full bg-white/5 border border-white/10 rounded-lg py-3 px-4 text-on-surface focus:ring-2 focus:ring-primary/40 focus:outline-none" placeholder="12.50"/></div>
      <div><label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">Expiry Date *</label>
        <input id="a-expiry" type="date" class="w-full bg-white/5 border border-white/10 rounded-lg py-3 px-4 text-on-surface focus:ring-2 focus:ring-primary/40 focus:outline-none"/></div>
      <div><label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">Supplier</label>
        <input id="a-supplier" class="w-full bg-white/5 border border-white/10 rounded-lg py-3 px-4 text-on-surface focus:ring-2 focus:ring-primary/40 focus:outline-none" placeholder="Cipla Ltd."/></div>
      <div><label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">Aisle Location</label>
        <input id="a-loc" class="w-full bg-white/5 border border-white/10 rounded-lg py-3 px-4 text-on-surface focus:ring-2 focus:ring-primary/40 focus:outline-none" placeholder="A-04-R2"/></div>
      <div><label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">Reorder Threshold</label>
        <input id="a-thresh" type="number" class="w-full bg-white/5 border border-white/10 rounded-lg py-3 px-4 text-on-surface focus:ring-2 focus:ring-primary/40 focus:outline-none" placeholder="30"/></div>
      <div><label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">Daily Usage (units)</label>
        <input id="a-usage" type="number" class="w-full bg-white/5 border border-white/10 rounded-lg py-3 px-4 text-on-surface focus:ring-2 focus:ring-primary/40 focus:outline-none" placeholder="10"/></div>
    </div>
    <div class="p-6 border-t border-white/5 flex gap-3 justify-end">
      <button onclick="closeAddModal()" class="px-5 py-2.5 rounded-xl bg-white/5 border border-white/10 text-sm font-bold">Cancel</button>
      <button id="a-submit" onclick="submitBatch()" class="px-5 py-2.5 rounded-xl liquid-gradient text-on-primary text-sm font-bold active:scale-95 flex items-center gap-2">
        <span id="a-btn-text">Add to Inventory</span><span id="a-spinner" class="spinner hidden"></span>
      </button>
    </div>
  </div>
</div>

<script>
let INVENTORY = [], USER_ROLE = null, alertsOpen = false;

authGuard(null, (user) => {
  USER_ROLE = user.role;
  const name = user.displayName || user.email.split("@")[0];
  document.getElementById("top-name").textContent = name;

  // Admins can't add stock
  if(user.role === "admin") {
    document.getElementById("add-stock-btn").classList.add("hidden");
    document.getElementById("add-stock-btn2").classList.add("hidden");
  }
  refreshData();
});

function goDashboard() {
  window.location.href = ROLE_PAGES[USER_ROLE] || "signin.html";
}

async function refreshData() {
  const res = await API.get("/api/inventory");
  INVENTORY = (res.data || []).sort((a,b)=>new Date(a.expiry)-new Date(b.expiry));

  const total = INVENTORY.length;
  const totalVal = INVENTORY.reduce((s,i)=>s+i.qty*i.unitCost,0);
  const critical = INVENTORY.filter(i=>{ const d=daysLeft(i.expiry); return d>=0&&d<=30; }).length;

  document.getElementById("stat-total").textContent    = total;
  document.getElementById("stat-value").textContent    = "₹" + totalVal.toLocaleString("en-IN",{maximumFractionDigits:0});
  document.getElementById("stat-critical").textContent = critical;
  if(!critical) document.getElementById("stat-action-badge").classList.add("hidden");

  buildFilters();
  renderCards(INVENTORY);
  renderAlerts();
}

function buildFilters() {
  const cats=[...new Set(INVENTORY.map(i=>i.category))];
  const sel=document.getElementById("cat-filter");
  sel.innerHTML='<option value="">Category: All</option>'+cats.map(c=>`<option>${c}</option>`).join("");
}

function filterInventory() {
  const q=document.getElementById("search-input").value.toLowerCase();
  const cat=document.getElementById("cat-filter").value;
  const status=document.getElementById("status-filter").value;
  const filtered=INVENTORY.filter(i=>{
    const d=daysLeft(i.expiry);
    const matchQ=!q||(i.name.toLowerCase().includes(q)||i.batch.toLowerCase().includes(q)||i.category.toLowerCase().includes(q));
    const matchCat=!cat||i.category===cat;
    let matchStatus=true;
    if(status==="critical") matchStatus=d<=7;
    else if(status==="warning") matchStatus=d>7&&d<=30||isLowStock(i);
    else if(status==="safe") matchStatus=d>30&&!isLowStock(i);
    return matchQ&&matchCat&&matchStatus;
  });
  renderCards(filtered);
}

function renderCards(items) {
  if(!items.length) {
    document.getElementById("inventory-cards").innerHTML='<div class="surface-container-low glass-panel rounded-xl border border-white/5 p-12 text-center text-on-surface-variant">No medicines found</div>';
    return;
  }

  // Group by medicine name
  const grouped={};
  items.forEach(i=>{
    if(!grouped[i.name]) grouped[i.name]={...i,batches:[i]};
    else grouped[i.name].batches.push(i);
  });

  document.getElementById("inventory-cards").innerHTML = Object.values(grouped).map(med => {
    const d = daysLeft(med.expiry);
    const isFefo = d>=0&&d<=30;
    const totalQty = med.batches.reduce((s,b)=>s+b.qty,0);
    const totalVal = med.batches.reduce((s,b)=>s+b.qty*b.unitCost,0);
    const statusDot = d<0?"text-error":d<=7?"text-error":d<=30?"text-tertiary":"text-secondary";
    const statusTxt = d<0?"Expired":d<=7?"Critical":d<=30?"Warning":"Stock Safe";

    const batchRows = med.batches.map(b=>{
      const bd=daysLeft(b.expiry);
      const barW=bd<0?100:Math.min(100,Math.max(5,(360-bd)/360*100));
      const barColor=bd<0?"bg-error":bd<=30?"bg-tertiary":"bg-secondary";
      const canEdit = USER_ROLE==="pharmacist"||USER_ROLE==="manager";
      return `<tr class="${bd<=30&&bd>=0?"bg-white/5 rounded-lg group":""} hover:bg-white/5 transition-colors">
        <td class="py-4 pl-4 rounded-l-xl font-mono font-bold text-primary">${b.batch}</td>
        <td class="py-4">${b.qty} Units</td>
        <td class="py-4">${b.expiry}</td>
        <td class="py-4">
          <div class="flex items-center gap-2">
            <span class="${bd<0?"text-error font-bold":bd<=30?"text-tertiary font-bold":"text-secondary"}">${bd<0?"Expired":bd+" Days"}</span>
            <div class="h-1.5 w-16 bg-white/10 rounded-full overflow-hidden"><div class="h-full ${barColor} rounded-full" style="width:${barW}%"></div></div>
          </div>
        </td>
        <td class="py-4 pr-4 rounded-r-xl text-right">
          ${bd<=30&&bd>=0?'<span class="bg-blue-500/20 text-blue-300 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest ring-1 ring-blue-500/40">Dispense Next</span>':''}
          ${canEdit&&USER_ROLE==="pharmacist"?`<button onclick="quickDispense('${b.id}','${b.name}')" class="ml-2 px-3 py-1 rounded-lg text-[10px] font-bold bg-primary/20 text-primary hover:bg-primary/30 transition-all">Dispense</button>`:""}
        </td>
      </tr>`;
    }).join("");

    return `<div class="surface-container-low glass-panel rounded-2xl border border-white/5 overflow-hidden transition-all hover:border-white/20 ${isFefo?"ring-1 ring-error/20":""}">
      <div class="p-6">
        <div class="flex justify-between items-start mb-6">
          <div class="space-y-1">
            <div class="flex items-center gap-3">
              <h3 class="text-2xl font-black tracking-tight text-on-surface">${med.name}</h3>
              <span class="bg-primary/10 text-primary-fixed px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">${med.category}</span>
              ${isFefo?'<span class="bg-error/10 text-error px-2 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">⚡ FEFO</span>':""}
            </div>
          </div>
          <div class="text-right">
            <div class="flex items-center gap-2 justify-end mb-1">
              <span class="w-2 h-2 rounded-full ${statusDot.replace('text-','bg-')} shadow-sm"></span>
              <span class="text-xs font-bold ${statusDot} uppercase">${statusTxt}</span>
            </div>
          </div>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-8 py-6 border-y border-white/5">
          <div><span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Total Quantity</span><p class="text-2xl font-black mt-1">${totalQty} <span class="text-xs font-medium text-outline">UNITS</span></p></div>
          <div><span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Total Value</span><p class="text-2xl font-black mt-1">₹${totalVal.toLocaleString("en-IN",{maximumFractionDigits:0})}</p></div>
          <div><span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Location</span><p class="text-2xl font-black mt-1 text-primary-fixed font-mono text-lg">${med.row||"—"}-${med.shelf||"—"}</p></div>
          <div class="flex items-end justify-end"><span class="text-[10px] font-bold text-on-surface-variant">${med.batches.length} batch${med.batches.length>1?"es":""}</span></div>
        </div>
        <div class="mt-6">
          <table class="w-full text-left">
            <thead class="text-[10px] font-bold text-outline uppercase tracking-widest">
              <tr><th class="pb-4">Batch #</th><th class="pb-4">Quantity</th><th class="pb-4">Expiry Date</th><th class="pb-4">Days Left</th><th class="pb-4 text-right">Action</th></tr>
            </thead>
            <tbody class="text-sm">${batchRows}</tbody>
          </table>
        </div>
      </div>
    </div>`;
  }).join("");
}

function renderAlerts() {
  const alerts=[];
  INVENTORY.forEach(i=>{
    const d=daysLeft(i.expiry);
    if(d<0) alerts.push({t:"error",m:`${i.name} (${i.batch}) — EXPIRED`});
    else if(d<=7) alerts.push({t:"error",m:`${i.name} expires in ${d} days`});
    else if(d<=30) alerts.push({t:"warn",m:`${i.name} expires in ${d} days`});
    if(i.qty<=(i.threshold||30)) alerts.push({t:"warn",m:`Low stock: ${i.name} (${i.qty} units)`});
  });
  const badge=document.getElementById("alert-badge");
  if(alerts.length){badge.textContent=alerts.length;badge.classList.remove("hidden");}
  document.getElementById("alerts-list").innerHTML=alerts.map(a=>
    `<div class="p-3 rounded-lg ${a.t==="error"?"bg-error/10 border border-error/20 text-error":"bg-tertiary/10 border border-tertiary/20 text-tertiary"} text-xs font-medium">${a.m}</div>`
  ).join("")||'<p class="text-center text-on-surface-variant py-8 text-sm">No alerts ✓</p>';
}

// ADD MODAL
function openAddModal() {
  if(USER_ROLE==="admin"){showToast("Admins have read-only access","error");return;}
  document.getElementById("add-modal").classList.remove("hidden");
  document.getElementById("add-modal").classList.add("flex");
}
function closeAddModal(){document.getElementById("add-modal").classList.add("hidden");document.getElementById("add-modal").classList.remove("flex");}

async function submitBatch() {
  const name=document.getElementById("a-name").value.trim();
  const batch=document.getElementById("a-batch").value.trim();
  const qty=parseInt(document.getElementById("a-qty").value);
  const expiry=document.getElementById("a-expiry").value;
  if(!name||!batch||!qty||!expiry){showToast("Fill all required fields","error");return;}

  document.getElementById("a-btn-text").textContent="Saving…";
  document.getElementById("a-spinner").classList.remove("hidden");
  document.getElementById("a-submit").disabled=true;

  const loc=(document.getElementById("a-loc").value||"A1-S1").split("-");
  const res=await API.post("/api/inventory",{
    name,batch,qty,unitCost:parseFloat(document.getElementById("a-cost").value)||0,expiry,
    category:document.getElementById("a-cat").value,
    supplier:document.getElementById("a-supplier").value||"",
    row:loc[0]||"A1",shelf:loc[1]||"S1",comp:loc[2]||"C1",
    threshold:parseInt(document.getElementById("a-thresh").value)||30,
    dailyUsage:parseInt(document.getElementById("a-usage").value)||10
  });

  document.getElementById("a-btn-text").textContent="Add to Inventory";
  document.getElementById("a-spinner").classList.add("hidden");
  document.getElementById("a-submit").disabled=false;

  if(res.status==="ok"){showToast(`✓ ${name} added`,"success");closeAddModal();refreshData();}
  else showToast("Error: "+(res.error||"Unknown"),"error");
}

function quickDispense(id,name){showToast(`Quick dispense for ${name} → Open Dispensing panel`,"info");}
function exportCSV(){
  const rows=[["Medicine","Category","Batch","Qty","Unit Cost","Value","Expiry"]];
  INVENTORY.forEach(i=>rows.push([i.name,i.category,i.batch,i.qty,i.unitCost,(i.qty*i.unitCost).toFixed(2),i.expiry]));
  const csv=rows.map(r=>r.join(",")).join("\n");
  const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download="veda-inventory-"+new Date().toISOString().slice(0,10)+".csv";a.click();
}
function toggleAlerts(){alertsOpen=!alertsOpen;document.getElementById("alerts-drawer").style.transform=alertsOpen?"translateX(0)":"translateX(100%)";}
function isLowStock(i){return i.qty<=(i.threshold||30);}
</script>
