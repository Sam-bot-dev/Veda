<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Veda | Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode:"class",
    theme:{ extend:{ colors:{
      "surface-container-low":"#161b2b","primary-fixed-dim":"#adc6ff","surface-bright":"#343949",
      "surface-variant":"#2f3445","on-primary":"#002e6a","secondary":"#4edea3","primary-fixed":"#d8e2ff",
      "on-surface":"#dee1f7","surface-dim":"#0e1322","on-background":"#dee1f7","outline":"#8c909f",
      "on-primary-fixed":"#001a42","on-primary-container":"#00285d","inverse-on-surface":"#2b3040",
      "background":"#0e1322","primary-container":"#4d8eff","on-secondary":"#003824",
      "surface-container-lowest":"#090e1c","secondary-fixed-dim":"#4edea3","secondary-fixed":"#6ffbbe",
      "tertiary-fixed":"#ffdad7","primary":"#adc6ff","on-secondary-fixed-variant":"#005236",
      "tertiary":"#ffb3ad","on-tertiary-container":"#5c0008","surface":"#0e1322",
      "inverse-primary":"#005ac2","tertiary-container":"#ff5451","on-surface-variant":"#c2c6d6",
      "on-error":"#690005","on-error-container":"#ffdad6","on-tertiary-fixed":"#410004",
      "on-tertiary-fixed-variant":"#930013","on-primary-fixed-variant":"#004395",
      "surface-container-highest":"#2f3445","error-container":"#93000a","surface-container-high":"#25293a",
      "surface-container":"#1a1f2f","error":"#ffb4ab","tertiary-fixed-dim":"#ffb3ad",
      "on-secondary-fixed":"#002113","surface-tint":"#adc6ff","outline-variant":"#424754",
      "on-tertiary":"#68000a","on-secondary-container":"#00311f","inverse-surface":"#dee1f7",
      "secondary-container":"#00a572"
    }, fontFamily:{"headline":["Inter"],"body":["Inter"],"label":["Inter"]},
    borderRadius:{"DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px"} } }
  }
</script>
<style>
  body { background-color:#0a0f1e; font-family:'Inter',sans-serif; overflow:hidden; }
  .glass-card { background:rgba(255,255,255,0.06); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.1); }
  .orb { position:absolute; border-radius:50%; filter:blur(80px); z-index:0; opacity:0.4; }
  .orb-1 { width:400px;height:400px;background:#1e3a8a;top:-100px;left:-100px; }
  .orb-2 { width:350px;height:350px;background:#312e81;bottom:-50px;right:-50px; }
  .orb-3 { width:300px;height:300px;background:#1e40af;top:40%;right:15%; }
  .spinner { width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 antialiased">
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<main class="relative z-10 w-full max-w-[480px]">
  <div class="glass-card rounded-xl p-8 md:p-12 shadow-[0_20px_40px_rgba(0,0,0,0.4)]">

    <!-- Header -->
    <div class="flex flex-col items-center text-center mb-10">
      <div class="w-16 h-16 bg-gradient-to-br from-primary to-primary-container rounded-xl flex items-center justify-center mb-6 shadow-lg">
        <span class="material-symbols-outlined text-white text-4xl" style="font-variation-settings:'FILL' 1">medical_services</span>
      </div>
      <h1 class="text-3xl font-extrabold tracking-tighter text-on-surface mb-2">Veda</h1>
      <p class="text-on-surface-variant font-medium text-sm max-w-[280px]">Precision inventory for the medicines that matter.</p>
    </div>

    <!-- Error Banner -->
    <div id="error-banner" class="hidden mb-6 px-4 py-3 rounded-lg bg-error-container/20 border border-error/30 text-error text-sm font-medium text-center"></div>

    <!-- Form -->
    <form id="signin-form" class="space-y-6" onsubmit="return false">
      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1" for="email">Work Email</label>
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
            <span class="material-symbols-outlined text-[20px]">alternate_email</span>
          </div>
          <input class="w-full bg-white/5 border border-white/10 rounded-lg py-3.5 pl-11 pr-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/40 focus:border-primary/40 focus:outline-none transition-all"
            id="email" placeholder="pharmacist@hospital.org" type="email" autocomplete="email" required/>
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1" for="password">Password</label>
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
            <span class="material-symbols-outlined text-[20px]">lock</span>
          </div>
          <input class="w-full bg-white/5 border border-white/10 rounded-lg py-3.5 pl-11 pr-12 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/40 focus:border-primary/40 focus:outline-none transition-all"
            id="password" placeholder="••••••••" type="password" autocomplete="current-password" required/>
          <button type="button" id="toggle-pw" class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant hover:text-on-surface transition-colors">
            <span class="material-symbols-outlined text-[20px]">visibility</span>
          </button>
        </div>
      </div>

      <div class="flex items-center justify-between pt-1">
        <label class="flex items-center gap-2 cursor-pointer group">
          <input id="remember" class="w-4 h-4 rounded border-white/10 bg-white/5 text-primary focus:ring-primary/40" type="checkbox"/>
          <span class="text-sm text-on-surface-variant group-hover:text-on-surface">Remember session</span>
        </label>
        <a class="text-sm font-semibold text-primary hover:text-primary-fixed-dim transition-colors" href="signup.html">Create Account</a>
      </div>

      <button id="signin-btn" type="submit"
        class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold py-4 rounded-lg shadow-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
        <span id="btn-text">Sign In to Dashboard</span>
        <span id="btn-spinner" class="spinner hidden"></span>
        <span id="btn-arrow" class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
      </button>
    </form>

    <!-- Role hints -->
    <div class="mt-10 pt-8 border-t border-white/5 flex flex-wrap justify-center gap-2">
      <div class="px-3 py-1.5 rounded-full bg-white/5 border border-white/5 flex items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full bg-primary-container"></span>
        <span class="text-[11px] font-bold text-on-surface-variant tracking-tight uppercase">@manager <span class="font-normal normal-case opacity-60">→ Manager</span></span>
      </div>
      <div class="px-3 py-1.5 rounded-full bg-white/5 border border-white/5 flex items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full bg-secondary"></span>
        <span class="text-[11px] font-bold text-on-surface-variant tracking-tight uppercase">@admin <span class="font-normal normal-case opacity-60">→ Admin</span></span>
      </div>
      <div class="px-3 py-1.5 rounded-full bg-white/5 border border-white/5 flex items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full bg-tertiary"></span>
        <span class="text-[11px] font-bold text-on-surface-variant tracking-tight uppercase">Others <span class="font-normal normal-case opacity-60">→ Pharmacist</span></span>
      </div>
    </div>
  </div>

  <!-- Status bar -->
  <div class="mt-6 flex justify-center items-center gap-4 text-[10px] font-bold uppercase tracking-widest text-on-surface-variant/40">
    <div class="flex items-center gap-1.5">
      <span class="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>SYSTEM SECURE
    </div>
    <span class="opacity-30">|</span>
    <div>V 1.0 · VEDA HOSPITAL</div>
  </div>
</main>

<script>
// Toggle password visibility
document.getElementById("toggle-pw").addEventListener("click", () => {
  const pw = document.getElementById("password");
  const icon = document.querySelector("#toggle-pw .material-symbols-outlined");
  if (pw.type === "password") { pw.type = "text"; icon.textContent = "visibility_off"; }
  else { pw.type = "password"; icon.textContent = "visibility"; }
});

// Sign in handler
document.getElementById("signin-form").addEventListener("submit", async () => {
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const banner   = document.getElementById("error-banner");
  const btnText  = document.getElementById("btn-text");
  const spinner  = document.getElementById("btn-spinner");
  const arrow    = document.getElementById("btn-arrow");
  const btn      = document.getElementById("signin-btn");

  if (!email || !password) { showBanner("Please fill in all fields."); return; }

  // Loading state
  btn.disabled = true;
  btnText.textContent = "Signing in…";
  spinner.classList.remove("hidden");
  arrow.classList.add("hidden");
  banner.classList.add("hidden");

  const role = detectRole(email);

  if (FIREBASE_OK) {
    try {
      const cred = await _auth.signInWithEmailAndPassword(email, password);
      sessionStorage.setItem("veda_user", JSON.stringify({ email: cred.user.email, role }));
      window.location.href = ROLE_PAGES[role];
    } catch (err) {
      const msgs = {
        "auth/user-not-found":    "No account found with this email.",
        "auth/wrong-password":    "Incorrect password. Please try again.",
        "auth/too-many-requests": "Too many attempts. Try again later.",
        "auth/invalid-email":     "Invalid email format.",
        "auth/network-request-failed": "Network error. Check your connection."
      };
      showBanner(msgs[err.code] || err.message);
      resetBtn();
    }
  } else {
    // Demo mode — bypass Firebase
    setTimeout(() => {
      sessionStorage.setItem("veda_demo_user", JSON.stringify({ email, role, displayName: email.split("@")[0] }));
      window.location.href = ROLE_PAGES[role];
    }, 600);
  }
});

function showBanner(msg) {
  const b = document.getElementById("error-banner");
  b.textContent = msg;
  b.classList.remove("hidden");
  resetBtn();
}

function resetBtn() {
  document.getElementById("signin-btn").disabled = false;
  document.getElementById("btn-text").textContent = "Sign In to Dashboard";
  document.getElementById("btn-spinner").classList.add("hidden");
  document.getElementById("btn-arrow").classList.remove("hidden");
}

// If already logged in, redirect
if (FIREBASE_OK) {
  _auth.onAuthStateChanged(user => {
    if (user) window.location.href = ROLE_PAGES[detectRole(user.email)];
  });
} else {
  const demo = sessionStorage.getItem("veda_demo_user");
  if (demo) {
    const u = JSON.parse(demo);
    window.location.href = ROLE_PAGES[u.role];
  }
}
</script>
</body>
</html>
